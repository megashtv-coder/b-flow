<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>

  <!-- Briefcase body -->
  <rect x="45" y="70" width="110" height="70" rx="8" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="2"/>

  <!-- Briefcase handle -->
  <path
    d="M 60 70 Q 100 40 140 70"
    stroke="#3b82f6"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
  />

  <!-- Briefcase clasp -->
  <rect x="95" y="65" width="10" height="10" rx="2" fill="#3b82f6"/>

  <!-- Growth indicator - bars inside briefcase -->
  <g fill="#3b82f6">
    <rect x="60" y="100" width="12" height="25" rx="2"/>
    <rect x="80" y="88" width="12" height="37" rx="2"/>
    <rect x="100" y="76" width="12" height="49" rx="2"/>
    <rect x="120" y="92" width="12" height="33" rx="2"/>
  </g>

  <!-- Upward arrow accent -->
  <path
    d="M 100 110 L 100 85"
    stroke="#3b82f6"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
  />
  <path
    d="M 100 85 L 95 92 M 100 85 L 105 92"
    stroke="#3b82f6"
    stroke-width="2.5"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
